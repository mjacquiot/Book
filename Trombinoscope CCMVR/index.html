<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trombinoscope & Carte Interactive - Marches du Velay-Rochebaron</title>
    
    <!-- Meta tags SEO -->
    <meta name="description" content="Découvrez le trombinoscope interactif et la cartographie des élus de la Communauté de Communes des Marches du Velay-Rochebaron.">
    <meta name="author" content="Communauté de Communes Marches du Velay-Rochebaron">
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Header -->
        <header class="app-header">
            <div class="brand">
                <img src="logo.png" alt="Logo Velay-Rochebaron" class="logo-img" id="app-logo">
                <div class="brand-text">
                    <h1>Marches du Velay-Rochebaron</h1>
                    <p>Conseil Communautaire 2026-2032</p>
                </div>
            </div>
            
            <!-- Navigation -->
            <nav class="nav-menu">
                <button class="nav-btn active" id="nav-trombi" data-view="trombi">
                    <i data-lucide="users"></i>
                    <span>Trombinoscope</span>
                </button>
                <button class="nav-btn" id="nav-map" data-view="map">
                    <i data-lucide="map"></i>
                    <span>Carte Interactive</span>
                </button>
            </nav>
            
            <div class="header-actions">
                <!-- Theme Toggle -->
                <button class="theme-toggle-btn" id="theme-toggle" aria-label="Changer de thème">
                    <i data-lucide="sun" class="sun-icon"></i>
                    <i data-lucide="moon" class="moon-icon"></i>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="app-main-content">
            
            <!-- VIEW 1: TROMBINOSCOPE HOME -->
            <section class="view-section active" id="view-trombi">
                <div class="view-controls">
                    <h2 class="section-title">Les Élus Communautaires</h2>
                    
                    <div class="controls-wrapper">
                        <!-- Search Box -->
                        <div class="search-box">
                            <i data-lucide="search" class="search-icon"></i>
                            <input type="text" id="search-elu" placeholder="Rechercher un élu, un rôle, une commune..." autocomplete="off">
                            <button id="clear-search" class="clear-btn" aria-label="Effacer la recherche">
                                <i data-lucide="x"></i>
                            </button>
                        </div>

                        <!-- Sorting & Filters Group -->
                        <div class="filter-controls">
                            <span class="filter-label">Classer par :</span>
                            <div class="toggle-group">
                                <button class="toggle-btn active" id="sort-role" data-sort="role">
                                    <i data-lucide="award"></i>
                                    <span>Rôle d'importance</span>
                                </button>
                                <button class="toggle-btn" id="sort-commune" data-sort="commune">
                                    <i data-lucide="map-pin"></i>
                                    <span>Commune</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Grid wrapper dynamically populated by JS -->
                <div class="trombi-groups-container" id="trombi-groups">
                    <!-- Dynamic groups and cards injected here -->
                </div>
            </section>

            <!-- VIEW 2: INTERACTIVE MAP DIRECT ACCESS -->
            <section class="view-section" id="view-map">
                <div class="map-layout-container">
                    <!-- Map Canvas -->
                    <div class="full-map-wrapper">
                        <div id="leaflet-map-full"></div>
                        <div class="map-instructions-overlay">
                            <i data-lucide="info"></i>
                            <span>Cliquez sur une commune pour afficher ses élus</span>
                        </div>
                    </div>
                    
                    <!-- Side panel for town details, shown when a commune is clicked -->
                    <aside class="map-side-panel" id="town-side-panel">
                        <div class="panel-header">
                            <div class="panel-title-group">
                                <i data-lucide="map-pin"></i>
                                <h3 id="panel-town-name">Sélectionnez une commune</h3>
                            </div>
                            <button class="close-panel-btn" id="close-town-panel" aria-label="Fermer le panneau">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div class="panel-body">
                            <p class="panel-subtitle" id="panel-town-count">0 élu(s) communautaire(s)</p>
                            <div class="town-elus-grid" id="town-elus-list">
                                <!-- Cards of town officials injected here -->
                            </div>
                        </div>
                    </aside>
                </div>
            </section>

            <!-- VIEW 3: ELECTED OFFICIAL DETAIL VIEW -->
            <section class="view-section" id="view-detail">
                <div class="detail-layout-container">
                    
                    <!-- Left Column: Portrait & Biography & Neighbors -->
                    <div class="detail-left-col">
                        <!-- Navigation Back Button -->
                        <button class="back-to-trombi-btn" id="back-btn">
                            <i data-lucide="arrow-left"></i>
                            <span>Retour</span>
                        </button>
                        
                        <div class="detail-card-glass">
                            <div class="detail-profile-header">
                                <div class="detail-avatar-wrapper">
                                    <img src="" alt="" class="detail-avatar" id="detail-photo">
                                </div>
                                <div class="detail-bio-group">
                                    <h2 class="detail-name" id="detail-fullname">Prénom NOM</h2>
                                    <span class="detail-role-badge" id="detail-role">Rôle</span>
                                    <p class="detail-attributions" id="detail-attributions">Détail des délégations</p>
                                    
                                    <div class="detail-meta-item">
                                        <i data-lucide="map-pin"></i>
                                        <span id="detail-commune">Commune</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Same town colleagues section -->
                        <div class="colleagues-container">
                            <h3 class="colleagues-title">
                                <i data-lucide="users"></i>
                                <span>Autres élus de cette commune</span>
                            </h3>
                            <div class="colleagues-scroller" id="colleagues-list">
                                <!-- Group images list injected here -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Column: Highlighted Mini Map -->
                    <div class="detail-right-col">
                        <div class="detail-map-card">
                            <div id="leaflet-map-detail"></div>
                            <div class="map-label-overlay" id="detail-map-commune-label">
                                Commune
                            </div>
                            <!-- Boutons de zoom interactifs -->
                            <div class="detail-map-controls">
                                <button class="map-control-btn active" id="btn-zoom-commune" title="Zoomer sur la commune">
                                    <i data-lucide="maximize-2"></i>
                                    <span>Commune</span>
                                </button>
                                <button class="map-control-btn" id="btn-zoom-global" title="Voir l'ensemble de la collectivité">
                                    <i data-lucide="globe"></i>
                                    <span>Vue globale</span>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </section>

        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Data files -->
    <script src="Fond_carte_interactive/boundaries.js"></script>
    <script src="Fond_carte_interactive/features.js"></script>
    <script src="elus_data.js"></script>
    
    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
