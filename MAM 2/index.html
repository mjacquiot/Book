                                            <td className="p-3 text-center">{row.daysPresent}</td><td className="p-3 text-center">{row.hoursPresent.toFixed(1)}</td><td className="p-3 text-center">{row.mealsTaken}</td>
                                            <td className="p-3 text-right">{row.totalSalaireH.toFixed(2)}€</td><td className="p-3 text-right">{row.totalIE.toFixed(2)}€</td><td className="p-3 text-right">{row.totalIR.toFixed(2)}€</td>
                                            <td className="p-3 text-right font-bold text-emerald-700 bg-emerald-50">{(row.totalSalaireH + row.totalIE + row.totalIR).toFixed(2)} €</td>
                                        </tr>
                                    ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const FinancesTab = ({ ams, expenses, setExpenses, getActualScheduleForDay }) => {
            const [targetMonth, setTargetMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newExp, setNewExp] = useState({ title: '', amount: '' });
            const monthExpenses = expenses.filter(e => e.date.startsWith(targetMonth));
            const totalExpenses = monthExpenses.reduce((sum, e) => sum + e.amount, 0);
            const [y, m] = targetMonth.split('-');
            const daysInMonth = new Date(y, m, 0).getDate();

            const amStats = ams.map(am => {
                let hoursWorked = 0;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${y}-${m}-${d.toString().padStart(2, '0')}`;
                    const sched = getActualScheduleForDay(am.id, 'AM', dateStr);
                    if (sched) hoursWorked += getHoursDiff(sched.start, sched.end);
                }
                return { ...am, hoursWorked };
            });
            const totalMAMHours = amStats.reduce((sum, a) => sum + a.hoursWorked, 0);

            return (
                <div className="space-y-6">
                    <div className="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <h2 className="text-xl font-bold text-gray-800">Partage des Charges :</h2>
                        <div className="flex gap-4 items-center">
                            <input type="month" value={targetMonth} onChange={e => setTargetMonth(e.target.value)} className="border p-2 rounded font-bold text-blue-600 bg-blue-50" />
                            <button onClick={() => window.print()} className="bg-gray-100 p-2 rounded text-sm shadow-sm hover:bg-gray-200 font-bold">🖨️ Imprimer</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">Répartition Équitable (Heures Réelles)</h3>
                            <table className="w-full text-left text-sm">
                                <thead><tr className="border-b text-gray-500"><th className="pb-2">AM</th><th className="pb-2">Heures</th><th className="pb-2">Quote-Part</th><th className="pb-2 text-right">À Payer</th></tr></thead>
                                <tbody>
                                    {amStats.map(am => {
                                        const ratio = totalMAMHours > 0 ? (am.hoursWorked / totalMAMHours) : 0;
                                        const toPay = totalExpenses * ratio;
                                        return <tr key={am.id} className="border-b"><td className="py-3 font-bold">{am.name}</td><td className="py-3">{am.hoursWorked.toFixed(1)}h</td><td className="py-3 text-gray-600">{(ratio * 100).toFixed(1)}%</td><td className="py-3 text-right font-bold text-blue-600">{toPay.toFixed(2)} €</td></tr>
                                    })}
                                </tbody>
                            </table>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">Factures du mois</h3>
                            <div className="flex gap-2 mb-4">
                                <input type="text" placeholder="Intitulé" className="border p-2 rounded w-1/2" value={newExp.title} onChange={e => setNewExp({ ...newExp, title: e.target.value })} />
                                <input type="number" placeholder="Montant €" className="border p-2 rounded w-1/3" value={newExp.amount} onChange={e => setNewExp({ ...newExp, amount: parseFloat(e.target.value) })} />
                                <button className="bg-blue-600 text-white px-3 rounded hover:bg-blue-700" onClick={() => { if (newExp.title && newExp.amount) { setExpenses([...expenses, { id: Date.now(), date: `${targetMonth}-01`, title: newExp.title, amount: newExp.amount }]); setNewExp({ title: '', amount: '' }); } }}>+</button>
                            </div>
                            <div className="max-h-64 overflow-y-auto"><table className="w-full text-left text-sm"><tbody>{monthExpenses.map(e => (<tr key={e.id} className="border-b bg-gray-50"><td className="p-2">{e.title}</td><td className="p-2 font-bold">{e.amount.toFixed(2)} €</td><td className="p-2 text-right"><button onClick={() => setExpenses(expenses.filter(x => x.id !== e.id))} className="text-red-500">&times;</button></td></tr>))}</tbody></table></div>
                            <div className="mt-4 text-right text-lg font-bold">Total : <span className="text-blue-600">{totalExpenses.toFixed(2)} €</span></div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPOSANT PRINCIPAL APP ---
        function App() {
            const [ams, setAms] = useState([]);
            const [kids, setKids] = useState([]);
            const [contracts, setContracts] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [dailyLogs, setDailyLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [saveIndicator, setSaveIndicator] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);

            useEffect(() => {
                const savedData = localStorage.getItem('mam_erp_v16'); // Updated Key
                if (savedData) {
                    const p = JSON.parse(savedData);
                    setAms(p.ams || []); setKids(p.kids || []); setContracts(p.contracts || []);
                    setExpenses(p.expenses || []); setDailyLogs(p.dailyLogs || []);
                }
                const authYear = localStorage.getItem('mam_auth_year');
                const currentYear = new Date().getFullYear();
                if (authYear && (parseInt(authYear) === currentYear || parseInt(authYear) === currentYear + 1)) {
                    setIsAuthenticated(true);
                }
            }, []);

            useEffect(() => {
                const data = { ams, kids, contracts, expenses, dailyLogs };
                localStorage.setItem('mam_erp_v16', JSON.stringify(data)); // Updated Key
                setSaveIndicator('save-flash');
                const timer = setTimeout(() => setSaveIndicator('text-emerald-500'), 1000);
                return () => clearTimeout(timer);
            }, [ams, kids, contracts, expenses, dailyLogs]);

            const handleLogin = (validYear) => {
                localStorage.setItem('mam_auth_year', validYear);
                setIsAuthenticated(true);
            };

            const getExpectedSchedule = (targetId, type, dateStr) => {
                const targetContracts = contracts.filter(c => c.targetId === targetId && c.type === type);
                if (!targetContracts.length) return null;
                const date = new Date(dateStr);
                const dayOfWeek = date.getDay();
                const adjustedDay = dayOfWeek === 0 ? 7 : dayOfWeek;
                const weekNum = getWeekNumber(date);
                for (let c of targetContracts) {
                    if (dateStr >= c.startDate && dateStr <= c.endDate) {
                        if (c.recurrence === 'even' && weekNum % 2 !== 0) continue;
                        if (c.recurrence === 'odd' && weekNum % 2 === 0) continue;
                        const dayConfig = c.days[adjustedDay];
                        if (dayConfig && dayConfig.active) return { start: dayConfig.start, end: dayConfig.end };
                    }
                }
                return null;
            };

            const getActualScheduleForDay = (targetId, type, dateStr) => {
                const log = dailyLogs.find(l => l.targetId === targetId && l.type === type && l.date === dateStr);
                if (log) {
                    if (log.isAbsent) return null;
                    if (log.arrival || log.departure) return { start: log.arrival || '08:00', end: log.departure || '18:00' };

                    const exp = getExpectedSchedule(targetId, type, dateStr);
                    if (exp) return exp;
                    return { start: '08:00', end: '18:00' };
                }
                return getExpectedSchedule(targetId, type, dateStr);
            };

            const checkPresenceExpectedOnly = (targetId, type, dateStr, hour) => {
                const sched = getExpectedSchedule(targetId, type, dateStr);
                return (sched && hour >= parseInt(sched.start) && hour < parseInt(sched.end));
            };

            const checkPresenceGlobal = (targetId, type, dateStr, hour) => {
                const sched = getActualScheduleForDay(targetId, type, dateStr);
                return (sched && hour >= parseInt(sched.start) && hour < parseInt(sched.end));
            };

            const downloadBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ ams, kids, contracts, expenses, dailyLogs }));
                const dl = document.createElement('a');
                dl.setAttribute("href", dataStr);
                dl.setAttribute("download", "mam_sauvegarde_" + new Date().toISOString().split('T')[0] + ".json");
                document.body.appendChild(dl); dl.click(); dl.remove();
            };

            const handleImport = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try { const p = JSON.parse(ev.target.result); if (p.ams) { setAms(p.ams); setKids(p.kids); setContracts(p.contracts); setExpenses(p.expenses); setDailyLogs(p.dailyLogs || []); alert("Données restaurées !"); } } catch (err) { alert("Fichier invalide."); }
                }; reader.readAsText(file);
            };

            if (!isAuthenticated) return <LoginScreen onLogin={handleLogin} />;

            const menuItems = [
                { id: 'dashboard', icon: '📊', label: 'Accueil & Sauvegardes' },
                { id: 'config', icon: '👩‍🍼', label: 'Équipe & Tarifs' },
                { id: 'contracts', icon: '📝', label: 'Contrats Théoriques' },
                { id: 'annual', icon: '📅', label: 'Vues Annuelles' },
                { id: 'tracking', icon: '✅', label: 'Pointage Quotidien' },
                { id: 'planning', icon: '🗓️', label: 'Planning Réel (Semaine)' },
                { id: 'delegations', icon: '🤝', label: 'Registre des Délégations' },
                { id: 'pajemploi', icon: '📄', label: 'Fiches Pajemploi' },
                { id: 'finances', icon: '💰', label: 'Charges MAM' }
            ];

            return (
                <div className="flex h-screen overflow-hidden">
                    <div className="w-64 bg-gray-900 text-white flex flex-col shadow-xl z-10 flex-shrink-0">
                        <div className="p-5 border-b border-gray-800">
                            <h1 className="text-2xl font-black text-emerald-400">MAM Manager</h1>
                            <p className="text-xs text-gray-400 mt-1">Communauté de Communes Marches du Velay Rochebaron</p>
                        </div>
                        <nav className="flex-1 px-3 py-4 space-y-1 overflow-y-auto hide-scrollbar">
                            {menuItems.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${activeTab === tab.id ? 'bg-emerald-600 text-white' : 'text-gray-300 hover:bg-gray-800'}`}>
                                    <span className="text-lg">{tab.icon}</span><span className="font-medium text-sm">{tab.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-gray-800 bg-gray-900 text-xs flex justify-between items-center">
                            <div className={`flex items-center gap-2 font-semibold ${saveIndicator === 'save-flash' ? 'save-flash' : 'text-emerald-500'}`}>
                                <div className="w-2 h-2 rounded-full bg-current"></div> Sauvegarde Auto
                            </div>
                            <button onClick={() => { localStorage.removeItem('mam_auth_year'); setIsAuthenticated(false); }} className="text-gray-500 hover:text-red-400 font-bold" title="Se déconnecter">
                                🔌 Quitter
                            </button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto hide-scrollbar p-6">
                        {activeTab === 'dashboard' && <DashboardTab ams={ams} kids={kids} contracts={contracts} handleExport={downloadBackup} handleImport={handleImport} />}
                        {activeTab === 'config' && <ConfigTab ams={ams} setAms={setAms} kids={kids} setKids={setKids} />}
                        {activeTab === 'contracts' && <ContractsTab ams={ams} kids={kids} contracts={contracts} setContracts={setContracts} />}
                        {activeTab === 'annual' && <AnnualViewTab ams={ams} kids={kids} checkPresenceGlobal={checkPresenceGlobal} checkPresenceExpectedOnly={checkPresenceExpectedOnly} />}
                        {activeTab === 'tracking' && <CompactTrackingTab ams={ams} kids={kids} dailyLogs={dailyLogs} setDailyLogs={setDailyLogs} getExpectedSchedule={getExpectedSchedule} />}
                        {activeTab === 'planning' && <PlanningTab ams={ams} kids={kids} getActualScheduleForDay={getActualScheduleForDay} getExpectedSchedule={getExpectedSchedule} dailyLogs={dailyLogs} setDailyLogs={setDailyLogs} />}
                        {activeTab === 'delegations' && <DelegationsTab ams={ams} kids={kids} getActualScheduleForDay={getActualScheduleForDay} />}
                        {activeTab === 'pajemploi' && <PajemploiTab kids={kids} ams={ams} getActualScheduleForDay={getActualScheduleForDay} dailyLogs={dailyLogs} />}
                        {activeTab === 'finances' && <FinancesTab ams={ams} expenses={expenses} setExpenses={setExpenses} getActualScheduleForDay={getActualScheduleForDay} />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
